# A string used to distinguish different Supabase projects on the same host.
project_id = "kazione-booking"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["https://localhost:8080"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ── Function config ──────────────────────────────────────────────────────────
# JWT verification is enabled by default for all functions.
# Stripe webhook must accept unsigned POST requests (Stripe signs with its own
# signature header, not a JWT). JWT verification is disabled for this function.
[functions.stripe-webhook]
verify_jwt = false

# send-reminders is called on a cron schedule, not by an authenticated user.
# JWT verification is disabled; it authenticates via the CRON_SECRET Bearer token instead.
# Schedule: daily at 08:00 UTC (catches 24h-ahead appointments for that day).
# NOTE: Supabase scheduled functions require the Pro plan or above.
[functions.send-reminders]
verify_jwt = false
# schedule = "0 8 * * *"   # uncomment when deploying to cloud (Pro plan required)

# pawapay-webhook receives signed POSTs from PawaPay's servers, not authenticated users.
# JWT verification is disabled; signature is verified via HMAC-SHA256 in the function.
[functions.pawapay-webhook]
verify_jwt = false

# pawapay-payment is a public endpoint called by the frontend before the user has a JWT.
[functions.pawapay-payment]
verify_jwt = false
